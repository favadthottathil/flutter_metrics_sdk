name: CI

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with: 
          flutter-version: '3.44.3'
          channel: 'stable'
      
      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test